<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: aqua;
        }
        @keyframes bubbleanimation {
            0%{
             
                bottom: -300px;
            }
            100%{
                 
                 bottom: 100%;
            }
            
        }
        .b1{
            width: 200px;
            height: 200px;
            position: absolute;
            bottom: -300px;
            border-radius: 50%;
            box-shadow: inset 0px 0px 30px 8px #fff;
            animation: bubbleanimation 5s 0s infinite linear;
            /* animation-timing-function: ease-in; */
        }

         .b2{
            width: 100px;
            height: 100px;
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            left: 300px;
            box-shadow: inset 0px 0px 30px 8px #fff;
             animation: bubbleanimation 8s 0.2s infinite linear;
            /* animation-timing-function: ease-in; */
        }
    </style>
</head>

<body>

    <div class="b1"></div>
    <div class="b2"></div>
    <div class="b3"></div>
    <div class="b4"></div>
    <div class="b5"></div>

</body>

</html>
