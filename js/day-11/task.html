<script>
    let factorialFun = (num1) => {

        let finalRes = 1

        if (num1 == 0 || num1 == 1) {
            return finalRes
        }
        else {
            for (let i = 1; i <= num1; i++) {
                finalRes = finalRes * i
            }

            return finalRes
        }

    }

    console.log(factorialFun(5));

    console.log(factorialFun(6));

    console.log(factorialFun(0));

    console.log(factorialFun(1)); 



    
</script>
