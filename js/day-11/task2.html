<script>

    let checkDuptinArray = (array) => {
        // console.log(array);
        let newArray = []
        for (let v of array) {
            let count = 0
            for (v1 of array) {
                if (v == v1) {
                    count++
                }
            }
            if (count > 1) {
                if (!newArray.includes(v)) {
                    newArray.push(v)
                }
            }

        }
        return newArray
    }


    let output = checkDuptinArray([10, 20, 99, 66, 10, 77, 8, 7, 20, 88, 66, 77, 44])

    console.log(output);

</script>
