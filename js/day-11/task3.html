<script>


    function checkEvenNumber(array){

        let newArray=[]
        for(let v of array){

            if(v%2==0){
                 
                 newArray.push(v)
            }
           
            
        }

        return newArray
    }

let outPut=checkEvenNumber([99,77,88,99,55,12,23,44,66])
    console.log(outPut);
