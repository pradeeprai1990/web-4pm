<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
    let opr="/"
    let a=10
    let b=20

    switch (opr) {
        case "+":
          console.log(a+b);
          break
        case "-": 
            console.log(a-b);
            break 
        case "*": 
            console.log(a*b);
            break     
        case "/": 
            console.log(a/b);
            break   
        default:         
             console.log("Invalid Opr");
             break 
    }




    let day=3

    switch (day) {
        case 1:
            console.log("Monday");
            break
        case 2:
            console.log("Tuesday");
            break
        case 3:
            console.log("Wednesday");
            break
        case 4:
            console.log("Thursday");
            break
        case 5:
            console.log("Friday");
            break
        case 6:
            console.log("Saturday");
            break
        case 7:
            console.log("Sunday");
            break
        default:
            console.log("Invalid Day");
            break
    }

    let month=1
    switch (month) {
        case 1:
            console.log("January");
            break
        case 2:
            console.log("February");
            break
        case 3:
            console.log("March");
            break
        case 4:
            console.log("April");
            break
        case 5:
            console.log("May");
            break
        case 6:
            console.log("June");
            break
        case 7:
            console.log("July");
            break
        case 8:
            console.log("August");
            break
        case 9:
            console.log("September");
            break
        case 10:
            console.log("October");
            break
        case 11:
            console.log("November");
            break
        case 12:
            console.log("December");
            break
        default:
             console.log("Invalid Month");
             break 
    }
</script>


</html>
