<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Ecom App</title>
  <style>
    :root {
      --bg: #f4efe8;
      --surface: #fffaf5;
      --surface-strong: #ffffff;
      --text: #1f1a17;
      --muted: #7a6d62;
      --accent: #c96f3b;
      --accent-soft: #f4d8c8;
      --border: #e8ddd3;
      --shadow: 0 18px 40px rgba(72, 46, 28, 0.08);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(201, 111, 59, 0.16), transparent 28%),
        linear-gradient(135deg, #f8f1ea 0%, #f2ebe4 50%, #efe7df 100%);
      color: var(--text);
      padding: 32px;
    }

    .app-shell {
      max-width: 1300px;
      margin: 0 auto;
      background: rgba(255, 250, 245, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 36px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 28px 32px;
      border-bottom: 1px solid var(--border);
    }

    .brand h1 {
      font-size: 1.9rem;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .brand p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .search-cart {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .search-box {
      min-width: 260px;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 12px 18px;
      color: var(--muted);
    }

    .cart-btn {
      border: none;
      background: var(--text);
      color: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
    }

    .sidebar {
      padding: 32px 24px;
      background: rgba(255, 255, 255, 0.35);
      border-right: 1px solid var(--border);
    }

    .sidebar h2,
    .products-header h2 {
      font-size: 1.3rem;
      margin-bottom: 18px;
    }

    .category-list {
      list-style: none;
      display: grid;
      gap: 12px;
      margin-bottom: 28px;
    }

    .category-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .category-item.active,
    .category-item:hover {
      background: var(--accent);
      color: #fff;
      transform: translateX(4px);
      border-color: var(--accent);
    }

    .promo-card {
      background: linear-gradient(160deg, #241914 0%, #4b2d20 100%);
      color: #fff;
      padding: 22px;
      border-radius: var(--radius-md);
    }

    .promo-card p {
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.5;
      margin: 10px 0 18px;
    }

    .promo-card a {
      display: inline-block;
      color: #fff;
      text-decoration: none;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
    }

    .products-panel {
      padding: 32px;
      position: relative;
    }

    .loading{
        position: absolute;
        width: 200px;
        display: none;
        left: 30%;
    }

    .products-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .products-header p {
      color: var(--muted);
      max-width: 520px;
      line-height: 1.5;
    }

    .filter-pill {
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #8c4c25;
      font-weight: 600;
      white-space: nowrap;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .product-card {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(85, 61, 43, 0.06);
    }

    .product-image {
      height: auto;
      width: 100%;
      border-radius: 22px;
      margin-bottom: 18px;
      object-fit: cover;
    
     
    }

  

   
    .product-meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      margin-bottom: 14px;
    }

    .product-meta h3 {
      font-size: 1.05rem;
      margin-bottom: 6px;
    }

    .product-meta p {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .price {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--accent);
      white-space: nowrap;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .rating {
      color: #d18a2f;
      font-size: 0.95rem;
    }

    .buy-btn {
      border: none;
      background: #221813;
      color: #fff;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 600;
    }

    @media (max-width: 1080px) {
      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 18px;
      }

      .topbar,
      .products-panel,
      .sidebar {
        padding: 24px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }

    @media (max-width: 640px) {
      .topbar,
      .products-header,
      .product-meta,
      .product-footer {
        flex-direction: column;
        align-items: flex-start;
      }

      .search-box {
        min-width: 100%;
      }

      .product-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>NovaMart</h1>
        <p>Curated daily essentials with a clean shopping experience.</p>
      </div>
      <div class="search-cart">
        <div class="search-box">Search products, brands, and categories</div>
        <button class="cart-btn">Cart (3)</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2>Categories</h2>

        <button  class="category-item " onclick="getProducts()">All Product</button>
        <ul class="category-list">
          
         
        </ul>

      </aside>

      <section class="products-panel">
        <div class="products-header">
          <div>
            <h2>Featured Products</h2>
            <p>Browse trending pieces across fashion, electronics, and essentials in a simple e-commerce layout.</p>
          </div>
          <div class="filter-pill">Popular This Week</div>
        </div>

        <img class="loading" src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Loading_2.gif?_=20170503175831" alt="">

        <div class="product-grid">
          

         
        </div>
      </section>
    </main>
  </div>
</body>
<script src="app.js"></script>
</html>
