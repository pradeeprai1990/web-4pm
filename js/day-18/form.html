<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="form-page">
    <div class="notification">
        your enquiry has been sent successfully! <span>&times;</span>
    </div>
    <main class="enquiry-wrapper">
        <section class="enquiry-card">
            <div class="enquiry-content">
                <p class="eyebrow">Let's Connect</p>
                <h1>Enquiry Form</h1>
                <p class="intro">
                    Share your details and message with us. We will get back to you as soon as possible.
                </p>

                <form class="enquiry-form">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" name="fullName" placeholder="Enter your full name">
                        </div>

                        <div class="input-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" name="phone" placeholder="Enter your phone number">
                        </div>

                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" name="email" placeholder="Enter your email">
                        </div>

                        <div class="input-group">
                            <label for="service">Service Needed</label>
                            <select name="service">
                                <option value="">Select a service</option>
                                <option>Web Design</option>
                                <option>Development</option>
                                <option>SEO</option>
                                <option>Support</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="message">Your Message</label>
                        <textarea name="message" rows="5" placeholder="Write your enquiry here"></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Enquiry</button>
                </form>
            </div>
        </section>
    </main>
</body>
<script src="app.js"></script>
</html>
